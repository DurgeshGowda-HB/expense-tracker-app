{% extends 'tracker/base.html' %}

{% block content %}

<h2>All Expenses</h2>

<form method="GET" class="mb-3">
    <input type="text" name="search" placeholder="Search expense" class="form-control mb-2">

    <select name="category" class="form-control mb-2">
        <option value="">All Categories</option>
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
        <option value="Bills">Bills</option>
        <option value="Other">Other</option>
    </select>

    <input type="date" name="start_date" class="form-control mb-2">
    <input type="date" name="end_date" class="form-control mb-2">

    <button type="submit" class="btn btn-primary">Filter</button>
</form>

<table class="table">
    <tr>
        <th>Title</th>
        <th>Amount</th>
        <th>Date</th>
        <th>Category</th>
        <th>Delete</th>
    </tr>

    {% for expense in expenses %}
    <tr>
        <td>{{ expense.title }}</td>
        <td>{{ expense.amount }}</td>
        <td>{{ expense.date }}</td>
        <td>{{ expense.category }}</td>
        <td>
            <a href="/edit/{{ expense.id }}/" class="btn btn-warning">Edit</a>
            <a href="/delete/{{ expense.id }}/" class="btn btn-danger">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
