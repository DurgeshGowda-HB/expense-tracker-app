<h2>Dashboard</h2>
<h4>Total Expense: {{ total }}</h4>

<canvas id="expenseChart"></canvas>

{{ monthly|json_script:"monthly-data" }}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const monthlyData = JSON.parse(document.getElementById('monthly-data').textContent);

    const labels = monthlyData.map(item => item.month);
    const dataValues = monthlyData.map(item => item.total);

    const data = {
        labels: labels,
        datasets: [{
            label: 'Monthly Expenses',
            data: dataValues,
            borderWidth: 2
        }]
    };

    const config = {
        type: 'line',
        data: data
    };

    new Chart(document.getElementById('expenseChart'), config);
</script>
