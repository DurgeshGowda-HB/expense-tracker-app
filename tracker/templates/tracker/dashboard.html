{% extends 'tracker/base.html' %}

{% block content %}
<h2>Dashboard</h2>

<h4>Total Expense: {{ total }}</h4>

<canvas id="expenseChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const labels = [
        {% for item in monthly %}
            "{{ item.month }}",
        {% endfor %}
    ];

    const dataValues = [
        {% for item in monthly %}
            {{ item.total }},
        {% endfor %}
    ];

    const data = {
        labels: labels,
        datasets: [{
            label: 'Monthly Expenses',
            data: dataValues,
            borderWidth: 2
        }]
    };

    const config = {
        type: 'line',
        data: data
    };

    new Chart(document.getElementById('expenseChart'), config);
</script>

{% endblock %}
